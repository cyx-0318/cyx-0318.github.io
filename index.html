<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>崔樱潇 - 个人介绍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
            scroll-behavior: smooth;
        }

        /* 简约渐变背景 */
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            padding: 90px 20px 40px;
        }

        /* 顶部固定导航栏 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #ffffff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 999;
        }

        .nav-name {
            font-size: 20px;
            font-weight: bold;
            color: #222;
        }

        .nav-links a {
            margin-left: 26px;
            text-decoration: none;
            color: #555;
            font-size: 16px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #4a6cf7;
        }

        /* 内容容器 */
        .container {
            max-width: 820px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 18px;
            padding: 40px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .card h2 {
            color: #2d3748;
            margin-bottom: 18px;
            font-size: 23px;
            border-left: 5px solid #4a6cf7;
            padding-left: 14px;
        }

        .card p {
            color: #4a5568;
            line-height: 1.8;
            font-size: 16px;
        }

        /* 首页卡片（姓名） */
        .name-card {
            text-align: center;
            padding: 55px 30px;
        }

        .name-card h1 {
            font-size: 38px;
            color: #1a202c;
            margin-bottom: 12px;
        }

        .name-card .subtitle {
            color: #718096;
            font-size: 17px;
        }

        /* 联系方式排版 */
        .contact p {
            margin: 10px 0;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            nav {
                flex-direction: column;
                gap: 12px;
                padding: 15px;
            }
            .nav-links a {
                margin: 0 10px;
            }
            .card {
                padding: 28px 22px;
            }
            .name-card h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

<!-- 导航栏 -->
<nav>
    <div class="nav-name">崔樱潇</div>
    <div class="nav-links">
        <a href="#name">姓名</a>
        <a href="#about">关于我</a>
        <a href="#skill">技术能力</a>
        <a href="#contact">联系方式</a>
    </div>
</nav>

<!-- 内容卡片 -->
<div class="container">
    <!-- 1 姓名卡片 -->
    <div class="card name-card" id="name">
        <h1>崔樱潇</h1>
        <p class="subtitle">大连海事大学  计算机类</p>
    </div>

    <!-- 2 关于我 -->
    <div class="card" id="about">
        <h2>关于我</h2>
        <p>我就读于大连海事大学计算机类专业，正在不断进行编程相关的学习，学习能力强，希望在实践中获得进步。</p>
    </div>

    <!-- 3 技术能力 -->
    <div class="card" id="skill">
        <h2>技术能力</h2>
        <p>较为熟练地掌握C语言，具有一定的Python基础，正在学习Java，能够进行AI编程。</p>
    </div>

    <!-- 4 联系方式 -->
    <div class="card contact" id="contact">
        <h2>联系方式</h2>
        <p>📩 邮箱：19254225439@139.com</p>
        <p>💻 GitHub：@cyx-0318</p>
    </div>
</div>

</body>
</html>
